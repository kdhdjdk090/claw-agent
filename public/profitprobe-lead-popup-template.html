<!-- ProfitProbe Lead Popup Template -->
<!-- Include this HTML near </body> on all pages. The script gates popup to landing pages only. -->
<div id="profitprobeLeadPopup" class="pp-popup" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="pp-popup-card">
    <button type="button" data-popup-close class="pp-popup-close" aria-label="Close">x</button>
    <h3>Get Your Free Trading Guide</h3>
    <p>Enter your details and we will send your guide instantly.</p>

    <form id="profitprobeLeadForm" data-lead-form="profitprobe" action="/api/leads" method="post">
      <input type="text" name="name" placeholder="Your name" required>
      <input type="email" name="email" placeholder="Your email" required>
      <input type="tel" name="phone" placeholder="Phone (optional)">
      <button type="submit">Get Free Guide</button>
    </form>
  </div>
</div>

<script src="/profitprobe-lead-tracker.js" defer></script>

<style>
  .pp-popup { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 9999; }
  .pp-popup.open { display: flex; }
  .pp-popup-card { width: min(92vw, 420px); background: #fff; border-radius: 12px; padding: 20px; position: relative; }
  .pp-popup-close { position: absolute; top: 8px; right: 10px; border: 0; background: transparent; font-size: 18px; cursor: pointer; }
  .pp-popup-card h3 { margin: 0 0 8px; }
  .pp-popup-card p { margin: 0 0 14px; color: #555; }
  .pp-popup-card form { display: grid; gap: 10px; }
  .pp-popup-card input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; }
  .pp-popup-card button[type="submit"] { padding: 11px 12px; border: 0; border-radius: 8px; background: #0d6efd; color: #fff; cursor: pointer; }
</style>
