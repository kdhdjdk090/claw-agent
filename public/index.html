<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #1e1e2e;
        }

        .header {
            background: linear-gradient(90deg, #2d2d44 0%, #3d3d5c 100%);
            padding: 20px;
            border-bottom: 1px solid #4d4d6c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 600;
            color: #61dafb;
        }

        .header p {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #1e1e2e;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #2d2d44;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #4d4d6c;
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.assistant .message-content {
            background: #2d2d44;
            border-left: 3px solid #61dafb;
            color: #e0e0e0;
        }

        .message.user .message-content {
            background: #61dafb;
            color: #1e1e2e;
            border-radius: 12px;
        }

        .message.system {
            justify-content: center;
        }

        .message.system .message-content {
            background: transparent;
            border: 1px solid #4d4d6c;
            color: #999;
            font-size: 12px;
            padding: 8px 12px;
            max-width: 90%;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #4d4d6c;
            background: #1e1e2e;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #4d4d6c;
            border-radius: 8px;
            background: #2d2d44;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #61dafb;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        button {
            padding: 12px 20px;
            background: #61dafb;
            color: #1e1e2e;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        button:hover {
            background: #45e0f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(97, 218, 251, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #4d4d6c;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #61dafb;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
            gap: 15px;
        }

        .empty-state-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 14px;
            color: #666;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦅 Claw AI Chat</h1>
            <p>Powered by advanced AI reasoning engine</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h2>Start a conversation</h2>
                <p>Ask me anything about coding, debugging, or ideas. I'm here to help!</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type your message... (or press Enter)"
                    autocomplete="off"
                >
            </div>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let isFirstMessage = true;

        // Handle Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Clear input
            userInput.value = '';

            // Clear empty state on first message
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }

            // Add user message to UI
            addMessage(message, 'user');

            // Disable send button
            sendBtn.disabled = true;

            try {
                // Send to API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error('Failed to get response');
                }

                const data = await response.json();
                addMessage(data.reply, 'assistant');
            } catch (error) {
                console.error('Error:', error);
                addMessage('Sorry, I encountered an error. Please try again.', 'system');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function addMessage(content, role) {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${role}`;
            // Use markdown rendering for assistant messages, plain text for user
            const rendered = role === 'assistant' ? formatMarkdown(content) : escapeHtml(content);
            messageElement.innerHTML = `<div class="message-content">${rendered}</div>`;
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMarkdown(t) {
            if (!t) return '';
            let s = String(t);
            // Escape HTML first
            s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Code blocks (fenced)
            s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });
            // Inline code
            s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Headers
            s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            // Bold and italic
            s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
            // Links (with URL validation)
            s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, text, url) {
                try {
                    const u = new URL(url, location.href);
                    if (!['https:', 'http:', 'mailto:'].includes(u.protocol)) return text;
                    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + text + '</a>';
                } catch(e) { return text; }
            });
            // Horizontal rule
            s = s.replace(/^---$/gm, '<hr>');
            // Bullet lists
            s = s.replace(/^[\u2022\-\*] (.+)$/gm, '<li>$1</li>');
            s = s.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
            // Ordered lists
            s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            // Blockquotes
            s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            // Paragraphs
            s = s.replace(/\n\n/g, '</p><p>');
            s = s.replace(/\n/g, '<br>');
            s = '<p>' + s + '</p>';
            // Clean up artifacts inside pre/code blocks
            s = s.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, function(_, c) {
                return '<pre><code>' + c.replace(/<br>/g, '\n').replace(/<\/?p>/g, '') + '</code></pre>';
            });
            // Remove stray breaks/paragraphs around block elements
            s = s.replace(/<\/(h[1-3]|pre|ul|ol|blockquote|hr)><br>/g, '</$1>');
            s = s.replace(/<br><(h[1-3]|pre|ul|ol|blockquote|hr)/g, '<$1');
            s = s.replace(/<p><(h[1-3]|pre|ul|ol|blockquote|hr)/g, '<$1');
            s = s.replace(/<\/(h[1-3]|pre|ul|ol|blockquote|hr)><\/p>/g, '</$1>');
            s = s.replace(/<p><\/p>/g, '');
            return s;
        }

        // Focus input on load
        userInput.focus();
    </script>
</body>
</html>
