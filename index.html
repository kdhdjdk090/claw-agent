<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Claw AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="light"]{
--bg:#f9f9f6;--surface:#fff;--surface-alt:#f3f2ee;--border:#e5e3de;--border-h:#d1cfc9;
--text:#1a1a1a;--text-2:#6b6966;--text-3:#a09d98;--accent:#c96442;--accent-h:#b55a3a;
--accent-bg:rgba(201,100,66,.06);--accent-br:rgba(201,100,66,.18);
--user-bg:#c96442;--user-tx:#fff;--code-bg:#f5f3f0;--code-br:#e5e2dd;
--green:#1a8a5c;--green-bg:rgba(26,138,92,.06);--green-br:rgba(26,138,92,.15);
--red:#d63031;--red-bg:rgba(214,48,49,.06);
--sh:0 1px 3px rgba(0,0,0,.04);--sh-l:0 4px 20px rgba(0,0,0,.07);
--sb-t:#d1cfc9;--ai-bg:#fef0eb;--radius:12px;
}
[data-theme="dark"]{
--bg:#1a1a1a;--surface:#262626;--surface-alt:#202020;--border:#363636;--border-h:#444;
--text:#ece9e4;--text-2:#9b9894;--text-3:#6b6966;--accent:#e08a66;--accent-h:#d07a56;
--accent-bg:rgba(224,138,102,.1);--accent-br:rgba(224,138,102,.22);
--user-bg:#c96442;--user-tx:#fff;--code-bg:#1e1e1e;--code-br:#363636;
--green:#3dd9a0;--green-bg:rgba(61,217,160,.08);--green-br:rgba(61,217,160,.18);
--red:#ff7675;--red-bg:rgba(255,118,117,.08);
--sh:0 1px 3px rgba(0,0,0,.2);--sh-l:0 4px 20px rgba(0,0,0,.3);
--sb-t:#444;--ai-bg:rgba(201,100,66,.12);--radius:12px;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;-webkit-font-smoothing:antialiased;line-height:1.6}

/* SVG Icon base */
.icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0}
.icon svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Sidebar */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:100}
.sb-head{padding:16px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.sb-brand{font-size:15px;font-weight:700;flex:1;color:var(--text)}
.sb-new{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sb-new:hover{background:var(--surface-alt);border-color:var(--border-h);color:var(--text)}

.sb-nav{padding:8px}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px 12px;border:none;background:none;border-radius:8px;font-size:13px;color:var(--text-2);cursor:pointer;transition:all .12s;font-family:inherit}
.sb-item:hover{background:var(--surface-alt);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.sb-item .icon{color:inherit}
.sb-sep{height:1px;background:var(--border);margin:4px 14px}

.sb-scroll{flex:1;overflow-y:auto;padding-bottom:12px}
.sb-scroll::-webkit-scrollbar{width:3px}.sb-scroll::-webkit-scrollbar-thumb{background:var(--sb-t);border-radius:2px}
.sb-label{padding:12px 16px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);font-weight:600}
.sb-skill{display:inline-block;padding:4px 10px;margin:2px;border-radius:14px;font-size:11px;background:var(--surface-alt);border:1px solid var(--border);color:var(--green);cursor:pointer;transition:all .12s;font-weight:500}
.sb-skill:hover{background:var(--green-bg);border-color:var(--green-br)}
.sb-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3);display:flex;justify-content:space-between}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Top bar */
.topbar{padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;height:48px;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:8px}
.menu-btn{display:none;width:32px;height:32px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;align-items:center;justify-content:center;font-family:inherit}
.tb-status{font-size:12px;color:var(--text-3)}
.tb-r{display:flex;align-items:center;gap:6px}
.pill{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.2px}
.pill-m{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-br)}
.pill-s{background:var(--green-bg);color:var(--green);border:1px solid var(--green-br)}
.pill-f{background:var(--surface-alt);color:var(--text-3);border:1px solid var(--border)}
.theme-btn{width:32px;height:32px;border-radius:8px;background:none;border:1px solid var(--border);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:inherit}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Chat */
.chat{flex:1;overflow-y:auto;scroll-behavior:smooth;background:var(--bg)}
.chat::-webkit-scrollbar{width:5px}.chat::-webkit-scrollbar-thumb{background:var(--sb-t);border-radius:3px}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:100%;padding:40px 24px;text-align:center;gap:20px}
.w-icon{width:48px;height:48px;border-radius:14px;background:var(--accent-bg);border:1px solid var(--accent-br);display:flex;align-items:center;justify-content:center;color:var(--accent)}
.w-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5}
.welcome h2{font-size:26px;font-weight:300;color:var(--text);letter-spacing:-.5px}.welcome h2 b{font-weight:700}
.welcome-sub{font-size:14px;color:var(--text-2);max-width:440px;line-height:1.7}
.qa-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.qa{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 18px;font-size:13px;color:var(--text);cursor:pointer;transition:all .18s;font-weight:500;box-shadow:var(--sh);font-family:inherit}
.qa:hover{border-color:var(--accent-br);background:var(--accent-bg);transform:translateY(-1px)}
.qa .icon{width:16px;height:16px}

/* Messages */
.msgs{max-width:760px;margin:0 auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px;width:100%}
.mr{display:flex;gap:12px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

.mr.user{justify-content:flex-end}
.mr.user .bubble{background:var(--user-bg);color:var(--user-tx);border-radius:20px 20px 4px 20px;padding:10px 16px;max-width:75%;font-size:14px;line-height:1.6}

.mr.ai{align-items:flex-start}
.ai-av{width:28px;height:28px;border-radius:50%;background:var(--ai-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;color:var(--accent)}
.ai-av svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.ai-body{flex:1;min-width:0}
.ai-lbl{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:6px}

/* AI content */
.ac{font-size:14px;line-height:1.75;color:var(--text)}
.ac b,.ac strong{color:var(--accent);font-weight:600}
.ac code{background:var(--code-bg);padding:1.5px 6px;border-radius:4px;font-size:12.5px;font-family:'SF Mono','Fira Code',Consolas,monospace;border:1px solid var(--code-br)}
.ac pre{background:var(--code-bg);padding:14px 16px;border-radius:8px;overflow-x:auto;margin:10px 0;font-size:12.5px;line-height:1.5;border:1px solid var(--code-br);font-family:'SF Mono','Fira Code',Consolas,monospace}
.ac pre code{background:none;border:none;padding:0;font-size:inherit}
.ac h1,.ac h2,.ac h3{margin:14px 0 6px;color:var(--text);font-weight:600}
.ac h1{font-size:18px}.ac h2{font-size:16px}.ac h3{font-size:15px}
.ac ul,.ac ol{padding-left:22px;margin:6px 0}.ac li{margin:3px 0}
.ac a{color:var(--accent);text-decoration:none}.ac a:hover{text-decoration:underline}
.ac blockquote{border-left:3px solid var(--border);padding-left:14px;color:var(--text-2);margin:8px 0;font-style:italic}
.ac hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.ac p{margin:0 0 8px}.ac p:last-child{margin:0}

.mr.sys .bubble{background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text-2)}

/* Thinking dots */
.thinking{display:flex;align-items:center;gap:6px;color:var(--text-3);font-size:13px;padding:4px 0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.4s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* Input */
.input-wrap{padding:0 24px 20px;background:var(--bg);display:flex;justify-content:center}
.input-box{width:100%;max-width:760px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--sh);transition:border-color .15s,box-shadow .15s}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.fprev{padding:6px 12px;margin:4px 12px 0;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;font-size:11px;display:none;align-items:center;gap:6px;color:var(--text-2)}
.fprev.show{display:flex}
.fprev .rm{cursor:pointer;color:var(--red);font-weight:700;margin-left:auto;font-size:13px}
.input-main{display:flex;align-items:flex-end;padding:8px 8px 8px 16px;gap:8px}
#mi{flex:1;border:none;background:none;color:var(--text);font-size:14px;outline:none;resize:none;font-family:inherit;line-height:1.5;min-height:24px;max-height:160px;padding:6px 0}
#mi::placeholder{color:var(--text-3)}
.ia{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-bottom:2px}
.btn-at{width:32px;height:32px;border-radius:8px;background:none;border:none;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.btn-at:hover{color:var(--accent);background:var(--accent-bg)}
.btn-at svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn-send{width:32px;height:32px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.btn-send:hover{background:var(--accent-h)}.btn-send:disabled{opacity:.25;cursor:not-allowed}
.btn-send svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.input-foot{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;font-size:11px;color:var(--text-3)}

/* Overlay + Mobile */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;backdrop-filter:blur(2px)}.overlay.show{display:block}

@media(max-width:768px){
.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);width:280px;box-shadow:var(--sh-l)}
.sidebar.open{transform:translateX(0)}
.menu-btn{display:flex}
.msgs{padding:16px 14px}
.mr.user .bubble{max-width:88%}
.welcome{padding:32px 16px;gap:16px}
.welcome h2{font-size:22px}
.qa-row{gap:6px}
.qa{padding:8px 14px;font-size:12px}
.input-wrap{padding:0 10px 12px}
.topbar{padding:0 12px;height:44px}
.pill{font-size:9px;padding:2px 7px}
.tb-r{gap:4px}
}
@media(max-width:400px){
.welcome h2{font-size:19px}
.welcome-sub{font-size:13px}
.qa{padding:7px 12px;font-size:11.5px}
.pill:not(.pill-m){display:none}
.sb-foot{font-size:10px}
}
/* Conversation history */
.sb-convos{overflow-y:auto;padding-bottom:4px}.sb-date{font-size:10px;font-weight:600;color:var(--text-3);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:.5px}
.sb-convo{display:flex;align-items:center;padding:6px 12px 6px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;transition:background .12s;gap:8px}.sb-convo:hover{background:var(--surface-alt)}.sb-convo.active{background:var(--accent-bg)}
.sb-convo-title{flex:1;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-2)}
.sb-convo.active .sb-convo-title{color:var(--accent);font-weight:500}
.sb-convo-del{display:none;width:18px;height:18px;border:none;background:none;color:var(--text-3);cursor:pointer;flex-shrink:0;padding:0;border-radius:4px;align-items:center;justify-content:center}
.sb-convo:hover .sb-convo-del{display:flex}
.sb-convo-del:hover{color:var(--red);background:rgba(220,38,38,.1)}
.sb-convo-del svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
</style>
</head>
<body>
<div class="overlay" id="ov" onclick="tSide()"></div>
<div class="sidebar" id="sb">
<div class="sb-head">
<div class="sb-logo">C</div>
<span class="sb-brand">Claw AI</span>
<button class="sb-new" onclick="doClear()" title="New chat"><span class="icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span></button>
</div>
<div class="sb-nav">
<button class="sb-item active" onclick="goChat()"><span class="icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>Chat</button>
<button class="sb-item" onclick="sc('/models')"><span class="icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>Models</button>
<button class="sb-item" onclick="sc('/skills')"><span class="icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></span>Skills</button>
<button class="sb-item" onclick="sc('/status')"><span class="icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>Status</button>
<button class="sb-item" onclick="sc('/help')"><span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>Help</button>
</div>
<div class="sb-sep"></div>
<div class="sb-scroll">
<div class="sb-label">Recent Chats</div>
<div class="sb-convos" id="convo-list"></div>
<div class="sb-sep"></div>
<div class="sb-label">Session</div>
<div class="sb-nav">
<button class="sb-item" onclick="sc('/sessions')"><span class="icon"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span>Sessions</button>
<button class="sb-item" onclick="sc('/resume')"><span class="icon"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></span>Resume</button>
<button class="sb-item" onclick="sc('/export')"><span class="icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>Export</button>
<button class="sb-item" onclick="doClear()"><span class="icon"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></span>Clear</button>
</div>
<div class="sb-sep"></div>
<div class="sb-label">System</div>
<div class="sb-nav">
<button class="sb-item" onclick="sc('/tools')"><span class="icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg></span>Tools (26)</button>
<button class="sb-item" onclick="sc('/permissions')"><span class="icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>Permissions</button>
<button class="sb-item" onclick="sc('/mcp')"><span class="icon"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg></span>MCP Servers</button>
<button class="sb-item" onclick="sc('/doctor')"><span class="icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>Doctor</button>
<button class="sb-item" onclick="sc('/cost')"><span class="icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span>Cost</button>
</div>
<div class="sb-sep"></div>
<div class="sb-label">Skills &middot; 18</div>
<div style="padding:4px 12px" id="ss"></div>
</div>
<div class="sb-foot"><span>Claw AI</span><span>v2.0</span></div>
</div>
<div class="main">
<div class="topbar">
<div class="tb-l">
<button class="menu-btn" onclick="tSide()"><span class="icon"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span></button>
<span class="tb-status" id="ts">Loading...</span>
</div>
<div class="tb-r">
<button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme"><span class="icon" id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></span></button>
</div>
</div>
<div class="chat" id="ch">
<div class="welcome" id="wl">
<div class="w-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
<h2 id="greet">Good evening, <b>sinwa</b></h2>
<p class="welcome-sub">How can I help you today?</p>
<div class="qa-row">
<button class="qa" onclick="qs('Write a Python web scraper')"><span class="icon"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>Code</button>

function updTI(t){document.getElementById('themeIcon').innerHTML=t==='dark'?'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>':'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>'}
function updGreet(){const h=new Date().getHours(),g=h<12?'Good morning':h<18?'Good afternoon':'Good evening';const el=document.getElementById('greet');if(el)el.innerHTML=g+', <b>sinwa</b>'}

/* Data */
const MD=[
{n:'DeepSeek V3',u:'Most Powerful 600B',p:'OR'},{n:'Qwen3 80B',u:'Best Balance',p:'OR'},
{n:'Llama 3.3 70B',u:'Most Stable',p:'OR'},{n:'Qwen Coder 32B',u:'Coding King',p:'OR'},
{n:'DeepSeek R1',u:'Reasoning',p:'OR'},{n:'Gemma 3 12B',u:'Fastest',p:'OR'},
{n:'GPT-4o-mini',u:'Reliable',p:'OR'},{n:'Claude 3 Haiku',u:'Natural Chat',p:'OR'},
{n:'Qwen3 Coder 480B',u:'Best Coder 480B',p:'ALI'},{n:'Qwen3.5 397B',u:'Most Powerful',p:'ALI'},
{n:'Qwen3 Max',u:'Flagship',p:'ALI'},{n:'Qwen3 235B',u:'Reasoning 235B',p:'ALI'},
{n:'Qwen3 Coder+',u:'Coding Expert',p:'ALI'},{n:'Qwen Plus',u:'Fast Balanced',p:'ALI'}
];

{id:'code',d:'Generate, edit & debug code'},{id:'analyze',d:'Research & data analysis'},
{id:'write',d:'Essays, emails, reports'},{id:'summarize',d:'Condense docs & articles'},
{id:'translate',d:'Any language pair'},{id:'math',d:'Calculations & reasoning'},
{id:'reason',d:'Logic & problem solving'},{id:'brainstorm',d:'Ideas & creative thinking'},
{id:'explain',d:'Simplify complex topics'},{id:'extract',d:'Structure data from text'},
{id:'vision',d:'Describe images & diagrams'},{id:'debug',d:'Find & fix bugs'},
{id:'refactor',d:'Improve code quality'},{id:'review',d:'Code review & feedback'},
{id:'test',d:'Write tests & QA'},{id:'docs',d:'Generate documentation'},
{id:'design',d:'System architecture'},{id:'search',d:'Web research & lookup'}
];
let H=[],CM=true,AF=null,CID=null,CONVOS=[];

/* Storage & Conversations */
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function getTitle(msgs){const u=msgs.find(m=>m.role==='u');if(!u)return'New chat';const t=u.content.slice(0,40);return t.length<u.content.length?t+'\u2026':t}
function loadConvos(){try{const s=localStorage.getItem('claw_convos');if(s)CONVOS=JSON.parse(s)}catch(e){CONVOS=[]}}
function saveConvos(){try{localStorage.setItem('claw_convos',JSON.stringify(CONVOS))}catch(e){}}
function saveConvo(){if(!CID||!H.length)return;
try{localStorage.setItem('claw_c_'+CID,JSON.stringify(H))}catch(e){}
const title=getTitle(H);const idx=CONVOS.findIndex(c=>c.id===CID);if(idx>=0){CONVOS[idx].title=title;CONVOS[idx].updated=Date.now()}
else{CONVOS.unshift({id:CID,title,updated:Date.now()})}saveConvos();renderConvos();}
function ss(){saveConvo()}
function lss(){loadConvos();
if(CONVOS.length){const last=CONVOS[0];try{const s=localStorage.getItem('claw_c_'+last.id);if(s){H=JSON.parse(s);CID=last.id;return H.length>0}}catch(e){}}
try{const s=localStorage.getItem('claw_h');if(s){H=JSON.parse(s);if(H.length){CID=genId();saveConvo();localStorage.removeItem('claw_h');return true}}}catch(e){}
return false;}
function newConvo(){if(CID&&H.length)saveConvo();
H=[];CID=genId();const old=document.getElementById('ma');if(old)old.remove();const wl=document.getElementById('wl');if(wl){wl.style.display='';updGreet()}
renderConvos();if(window.innerWidth<768)tSide();}
function loadConvo(id){if(id===CID)return;
if(CID&&H.length)saveConvo();try{const s=localStorage.getItem('claw_c_'+id);if(s){H=JSON.parse(s);CID=id;const old=document.getElementById('ma');if(old)old.remove();const wl=document.getElementById('wl');if(wl)wl.style.display='none';
H.forEach(m=>renderMsg(m));renderConvos();
if(window.innerWidth<768)tSide()}}catch(e){}
}
function delConvo(id,ev){ev.stopPropagation();try{localStorage.removeItem('claw_c_'+id)}catch(e){}
CONVOS=CONVOS.filter(c=>c.id!==id);saveConvos();
if(id===CID)newConvo();else renderConvos();
}
function renderConvos(){const el=document.getElementById('convo-list');if(!el)return;
if(!CONVOS.length){el.innerHTML='<div style="padding:4px 16px;font-size:11px;color:var(--text-3)">No conversations yet</div>';return}
const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();const yesterday=today-86400000,week=today-604800000;
const groups=[{l:'Today',i:[]},{l:'Yesterday',i:[]},{l:'Previous 7 Days',i:[]},{l:'Older',i:[]}];CONVOS.forEach(c=>{const u=c.updated||0;if(u>=today)groups[0].i.push(c);else if(u>=yesterday)groups[1].i.push(c);else if(u>=week)groups[2].i.push(c);else groups[3].i.push(c)});let h='';
groups.forEach(g=>{if(!g.i.length)return;h+='<div class="sb-date">'+g.l+'</div>';
g.i.forEach(c=>{h+='<div class="sb-convo'+(c.id===CID?' active':'')+'" onclick="loadConvo(\''+c.id+'\')"><span class="sb-convo-title">'+esc(c.title||'New chat')+'</span><button class="sb-convo-del" onclick="delConvo(\''+c.id+'\',event)" title="Delete"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>'})});
el.innerHTML=h;
}

/* Init */
function init(){
initTheme();rS();
if(lss()&&H.length){document.getElementById('wl').style.display='none';H.forEach(m=>renderMsg(m))}
else{CID=genId()}
renderConvos();fetchSt();
}
function rS(){document.getElementById('ss').innerHTML=SK.map(s=>'<span class="sb-skill" onclick="sc(\'/'+s.id+'\')">'+esc(s.id)+'</span>').join('')}
async function fetchSt(){
try{const r=await fetch('/api/models');const d=await r.json();if(d.council_enabled){document.getElementById('ts').textContent='Ready'}}
catch(e){document.getElementById('ts').textContent='Ready'}
}

/* Helpers */
function tSide(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('show')}
function goChat(){if(window.innerWidth<768)tSide();document.getElementById('mi').focus()}
function sc(t){document.getElementById('mi').value=t+' ';document.getElementById('mi').focus();if(window.innerWidth<768)tSide()}

function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm()}}
function hf(e){const f=e.target.files[0];if(!f)return;AF=f;document.getElementById('fn').textContent=esc(f.name)+' ('+(f.size/1024).toFixed(1)+'KB)';document.getElementById('fp').classList.add('show')}
function rf(){AF=null;document.getElementById('fp').classList.remove('show');document.getElementById('fi').value=''}
function esc(s){const el=document.createElement('span');el.textContent=String(s);return el.innerHTML}

/* Markdown */
function fm(t){
if(!t)return'';let s=String(t);
s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
s=s.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,l,c){return'<pre><code>'+c.trim()+'</code></pre>'});
s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
s=s.replace(/^---$/gm,'<hr>');
s=s.replace(/^[\u2022\-\*] (.+)$/gm,'<li>$1</li>');
s=s.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
s=s.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
s=s.replace(/\n\n/g,'</p><p>');
s=s.replace(/\n/g,'<br>');
s='<p>'+s+'</p>';
s=s.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g,function(_,c){return'<pre><code>'+c.replace(/<br>/g,'\n').replace(/<\/?p>/g,'')+'</code></pre>'});
s=s.replace(/<\/(h[1-3]|pre|ul|ol|blockquote|hr)><br>/g,'</$1>');
s=s.replace(/<br><(h[1-3]|pre|ul|ol|blockquote|hr)/g,'<$1');
s=s.replace(/<p><(h[1-3]|pre|ul|ol|blockquote|hr)/g,'<$1');
s=s.replace(/<\/(h[1-3]|pre|ul|ol|blockquote|hr)><\/p>/g,'</$1>');
s=s.replace(/<p><\/p>/g,'');
return s;
}

/* Render messages */
function renderMsg(m){
const area=ensureArea();const div=document.createElement('div');
if(m.role==='u'){
div.className='mr user';div.innerHTML='<div class="bubble">'+esc(m.content)+'</div>';
}else if(m.role==='a'){
div.className='mr ai';
let h='<div class="ai-av"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div class="ai-body">';
h+='<div class="ai-lbl">Claw AI';

h+='</div><div class="ac">'+fm(m.content)+'</div></div>';
div.innerHTML=h;
}else{
div.className='mr sys';div.innerHTML='<div class="bubble"><div class="ac">'+fm(m.content)+'</div></div>';
}
area.appendChild(div);document.getElementById('ch').scrollTop=document.getElementById('ch').scrollHeight;
}
function ensureArea(){let a=document.getElementById('ma');if(!a){a=document.createElement('div');a.id='ma';a.className='msgs';document.getElementById('ch').appendChild(a)}return a}

function am(role,content,council,consensus){
const m={role,content,c:council||false,p:consensus||0};
H.push(m);document.getElementById('wl').style.display='none';
renderMsg(m);ss();document.getElementById('ch').scrollTop=document.getElementById('ch').scrollHeight;
}
function ae(text){am('s',text)}

/* Send */
async function sm(){
const inp=document.getElementById('mi'),t=inp.value.trim();
if(!t)return;inp.value='';inp.style.height='auto';rf();
if(t.startsWith('/')){hc(t);return}
am('u',t);
const area=ensureArea();
const think=document.createElement('div');think.className='mr ai';think.id='thinking';
think.innerHTML='<div class="ai-av"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div class="ai-body"><div class="ai-lbl">Claw AI</div><div class="thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:4px">Thinking...</span></div></div>';
area.appendChild(think);document.getElementById('ch').scrollTop=document.getElementById('ch').scrollHeight;
const btn=document.getElementById('sb2');btn.disabled=true;
try{
const url=CM?'/api/council':'/api/chat';
let body={message:t};
if(AF){try{const c=await rft(AF);body.message=t+'\n\n--- File: '+AF.name+' ---\n'+c}catch(e){}}
const r=await fw(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
const d=await r.json();think.remove();
if(!r.ok){ae('Error: '+(d.error||'Server error'))}
else if(d.council){
let c=(d.reply||'').replace(/\[Council Consensus.*?\]\n?/g,'').trim();
if(!c){for(const resp of(d.all_responses||[])){if(resp.content?.trim()){c=resp.content.trim();break}}}
am('a',c||'No response',true,d.consensus_percentage);
}else{am('a',d.reply||'No response')}
}catch(e){think.remove();ae('Network error. Check your connection.')}
finally{btn.disabled=false;document.getElementById('mi').focus()}
}

async function fw(url,opts,retries=3){for(let i=0;i<retries;i++){try{const r=await fetch(url,opts);if(r.ok||i===retries-1)return r;await new Promise(s=>setTimeout(s,1000*Math.pow(2,i)))}catch(e){if(i===retries-1)throw e;await new Promise(s=>setTimeout(s,1000*Math.pow(2,i)))}}}

function rft(f){return new Promise((res,rej)=>{if(f.type.startsWith('text/')||f.name.match(/\.(js|py|json|md|html|css|txt|xml|yaml|yml|toml|cfg|ini|log|csv|ts|tsx|jsx|sql|sh|bat|rb|go|rs|java|cpp|c|h|hpp)$/i)){const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=()=>rej(new Error('Read failed'));rd.readAsText(f)}else{res('[Binary file: '+f.name+', '+(f.size/1024).toFixed(1)+'KB]')}})}

/* Slash Commands */
function hc(t){
const p=t.split(' '),cmd=p[0].toLowerCase(),arg=p.slice(1).join(' ').trim();
switch(cmd){
case'/help':
am('a','**Claw AI \u2014 All Commands**\n\n**Core:** /help \u00b7 /clear \u00b7 /status \u00b7 /version \u00b7 /doctor \u00b7 /models\n\n**Session:** /save \u00b7 /export \u00b7 /sessions \u00b7 /resume \u00b7 /delete \u00b7 /compact\n\n**System:** /tools \u00b7 /permissions \u00b7 /mcp \u00b7 /cost \u00b7 /config \u00b7 /memory \u00b7 /diff \u00b7 /undo \u00b7 /init \u00b7 /bug \u00b7 /approval\n\n**Skills (18):**\n'+SK.map(s=>'- **/'+s.id+'** \u2014 '+s.d).join('\n'));break;
case'/models':
am('a','**Models**\n\n**OpenRouter:**\n'+MD.filter(x=>x.p==='OR').map(x=>'- **'+x.n+'** \u2014 '+x.u).join('\n')+'\n\n**Alibaba Cloud:**\n'+MD.filter(x=>x.p==='ALI').map(x=>'- **'+x.n+'** \u2014 '+x.u).join('\n'));break;
case'/skills':
am('a','**Available Skills (18)**\n\n'+SK.map(x=>'- **/'+x.id+'** \u2014 '+x.d).join('\n')+'\n\nUsage: `/skill-name your request`');break;
case'/clear':doClear();break;
case'/status':
ae('**Status**\n- Skills: 18 loaded\n- Cost: FREE\n- Messages: '+H.length);break;
case'/version':
ae('**Claw AI v2.0**\n- 18 skills\n- Conversation history\n- File upload\n- Light/Dark theme');break;
case'/export':
let md='# Claw AI Chat\n\n';H.forEach(m=>md+='## '+m.role+'\n'+(m.content||'')+'\n\n');
const bl=new Blob([md],{type:'text/markdown'}),ur=URL.createObjectURL(bl),a=document.createElement('a');
a.href=ur;a.download='claw-'+Date.now()+'.md';a.click();URL.revokeObjectURL(ur);
ae('Exported as markdown');break;
case'/config':
ae('**Config**\n- Theme: '+document.documentElement.getAttribute('data-theme')+'\n- Skills: '+SK.length+'\n- Messages: '+H.length);break;
case'/memory':
const ch=H.reduce((s,m)=>s+(m.content?.length||0),0),tk=Math.round(ch/4),pc=Math.min(100,tk/2000).toFixed(1);
ae('**Context**\n- Tokens: ~'+tk.toLocaleString()+'\n- Max: 200,000\n- Usage: '+pc+'%');break;
case'/tools':
ae('**Tools (26)**\n\n**File:** read_file, write_file, list_directory, find_files\n**Shell:** run_command\n**Search:** grep_search\n**Edit:** replace_in_file, multi_edit_file, insert_at_line, diff_files\n**Web:** web_fetch, web_search\n**Agent:** run_subagent, plan_and_execute\n**Task:** task_create, task_update, task_list, task_get\n**Notebook:** notebook_run\n**Context:** get_workspace_context, git_diff, git_log\n**Utility:** sleep, config_get, config_set, powershell');break;
case'/cost':
ae('**Cost Tracker**\n- Session cost: $0.00 (FREE)\n- All models: Free tier via OpenRouter + Alibaba\n- No API key charges\n- Messages this session: '+H.length);break;
case'/sessions':
var sl=[];try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith('claw_ses_'))sl.push(k.replace('claw_ses_',''))}}catch(e){}
if(sl.length)ae('**Saved Sessions ('+sl.length+')**\n'+sl.map(x=>'- `'+x+'`').join('\n')+'\n\nUse `/resume <name>` to load');
else ae('**No saved sessions**\n\nUse `/save <name>` to save current chat');break;
case'/resume':
if(!arg){ae('Usage: `/resume <session-name>`\nType `/sessions` to list');break}
try{var sd=localStorage.getItem('claw_ses_'+arg);if(sd){H=JSON.parse(sd);ss();document.getElementById('ch').innerHTML='<div class="welcome" id="wl" style="display:none"></div>';var ma2=document.getElementById('ma');if(ma2)ma2.remove();H.forEach(m=>renderMsg(m));ae('Session "'+arg+'" resumed ('+H.length+' messages)')}else{ae('Session "'+arg+'" not found. Type `/sessions` to list')}}catch(e){ae('Failed to resume session')}break;
case'/delete':
if(!arg){ae('Usage: `/delete <session-name>`\nType `/sessions` to list');break}
try{localStorage.removeItem('claw_ses_'+arg);ae('Session "'+arg+'" deleted')}catch(e){ae('Failed to delete session')}break;
case'/compact':
var before=H.length;if(H.length>20){H=H.slice(-20);ss();ae('History compacted: '+before+' \u2192 '+H.length+' messages')}else{ae('History already compact ('+H.length+' messages)')}break;
case'/diff':
if(H.length<2){ae('Not enough messages to diff');break}
var last2=H.slice(-2);ae('**Last 2 messages**\n\n**['+last2[0].role+']:** '+last2[0].content.slice(0,200)+(last2[0].content.length>200?'...':'')+'\n\n**['+last2[1].role+']:** '+last2[1].content.slice(0,200)+(last2[1].content.length>200?'...':''));break;
case'/doctor':
var checks=[];checks.push('API endpoint: '+location.origin+'/api');checks.push('Theme: '+document.documentElement.getAttribute('data-theme'));checks.push('History: '+H.length+' messages');checks.push('Skills: '+SK.length+' loaded');checks.push('Storage: '+(localStorage?'Available':'Unavailable'));checks.push('File upload: '+(window.FileReader?'Supported':'Unsupported'));checks.push('Fetch API: '+(window.fetch?'Available':'Unavailable'));
ae('**Diagnostics**\n'+checks.map(x=>'- '+x).join('\n'));break;
case'/permissions':
ae('**Permission System**\n\n**Gated tools** (require approval in CLI):\n- run_command\n- write_file\n- replace_in_file\n- multi_edit_file\n- insert_at_line\n- powershell\n\n**Dangerous patterns** (22 blocked):\n- rm -rf, sudo, chmod 777, mkfs, dd if=\n- DROP TABLE, DELETE FROM, shutdown\n- curl|sh, eval(), exec()\n\n**Web UI:** All requests go through the API which has its own safety layer');break;
case'/undo':
if(H.length>=2){H.pop();H.pop();ss();document.getElementById('ch').innerHTML='<div class="welcome" id="wl" style="display:none"></div>';var ma3=document.getElementById('ma');if(ma3)ma3.remove();if(H.length){H.forEach(m=>renderMsg(m))}else{document.getElementById('wl').style.display=''}ae('Last exchange undone')}else{ae('Nothing to undo')}break;
case'/init':

async function callC(t){
const area=ensureArea();
const th=document.createElement('div');th.className='mr ai';th.id='thinking';
th.innerHTML='<div class="ai-av"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div class="ai-body"><div class="ai-lbl">Claw AI</div><div class="thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:4px">Thinking...</span></div></div>';
area.appendChild(th);document.getElementById('ch').scrollTop=document.getElementById('ch').scrollHeight;
const btn=document.getElementById('sb2');btn.disabled=true;
try{const r=await fw('/api/council',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})});
const d=await r.json();th.remove();
if(!r.ok)ae('Error: '+(d.error||'Error'));
else{let c=(d.reply||'').replace(/\[Council Consensus.*?\]\n?/g,'').trim();
if(!c){for(const resp of(d.all_responses||[])){if(resp.content?.trim()){c=resp.content.trim();break}}}
am('a',c||'No response',true,d.consensus_percentage)}}
catch(e){th.remove();ae('Network error')}
finally{btn.disabled=false;ss()}}
