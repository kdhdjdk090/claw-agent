<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Agent - Qwen3.5+</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">🦞</span>
      <span class="title">Claw Agent</span>
    </div>
    <div class="header-right">
      <select id="modelSelect" class="model-select">
        <option value="qwen/qwen3.5-397b-a17b">Qwen 3.5 397B</option>
      </select>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
      <button id="newChatBtn" class="icon-btn" title="New Chat">➕</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">🦞</div>
      <h2 id="welcomeTitle">Claw Agent</h2>
      <p id="welcomeSubtitle">AI browser agent with Qwen 3.5 397B</p>
      <p style="color: #00ff88; font-size: 11px; margin-top: 8px;">✅ NVIDIA NIM models configured</p>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="cost-bar" id="statusBar">
    <span id="statusText">Ready</span>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Ask anything... (e.g., 'Summarize this page')"></textarea>
    <button id="sendBtn" class="send-btn" title="Send">🚀</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
